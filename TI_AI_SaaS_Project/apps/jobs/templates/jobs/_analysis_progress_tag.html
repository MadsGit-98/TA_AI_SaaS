{# AI Analysis Progress Tag Component #}
{# Displays analysis progress status next to job title #}
{# Usage: Include in job card template with job context #}

{% if analysis_in_progress %}
<div class="analysis-progress-tag inline-flex items-center gap-1.5 px-3 py-1.5 bg-yellow-50 border-l-[3px] border-yellow-400 rounded font-mono text-xs font-semibold text-gray-900 shadow-sm" title="AI Analysis in Progress">
    <span class="progress-spinner inline-flex items-center justify-center w-4 h-4 text-yellow-600 animate-spin" aria-label="Loading">⟳</span>
    <span class="progress-text text-gray-900 tracking-wide uppercase">Analyzing... {{ progress_percentage|default:"0" }}%</span>
</div>
{% elif analysis_complete %}
<div class="analysis-done-tag inline-flex items-center gap-1.5 px-3 py-1.5 bg-gray-200 border-l-[3px] border-[#00ff00] rounded font-mono text-xs font-semibold text-gray-900 shadow-sm" title="AI Analysis Complete">
    <span class="done-icon inline-flex items-center justify-center w-4 h-4 bg-[#00ff00] text-gray-900 rounded-full text-[10px] font-bold">✓</span>
    <span class="done-text text-gray-900 tracking-wide uppercase">Analysis Done</span>
</div>
{% endif %}
