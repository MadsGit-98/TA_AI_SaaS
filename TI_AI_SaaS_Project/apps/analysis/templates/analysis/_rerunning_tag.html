{# Rerunning Tag Component - Displays when AI analysis is being re-run #}
{# Usage: Include in job card or job detail view #}

{% if analysis_rerunning %}
<div class="analysis-rerunning-tag inline-flex items-center gap-1.5 px-3 py-1.5 bg-code-block-bg border-l-[3px] border-[#ffcc00] rounded font-mono text-xs font-semibold text-primary-text shadow-sm animate-pulse" title="AI Analysis Re-running">
    <span class="rerun-icon inline-flex items-center justify-center w-4 h-4 bg-[#ffcc00] text-primary-text rounded-full text-[10px] font-bold">⟳</span>
    <span class="rerun-text text-primary-text tracking-wide uppercase">Analysis Re-running</span>
</div>
{% endif %}
